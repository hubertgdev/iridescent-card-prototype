<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Holo SideXP</title>
  </head>
  <body>
    <div class="page">
      <div id="card" class="card">
        <canvas id="card-canvas" class="card__canvas"></canvas>
      </div>
    </div>
    <div class="controls">
      <label class="control">
        Front foil
        <input type="file" id="upload-front" accept="image/*" hidden />
      </label>
      <label class="control">
        Back foil
        <input type="file" id="upload-back" accept="image/*" hidden />
      </label>
      <label class="control">
        Shape
        <input type="file" id="upload-shape" accept="image/*" hidden />
      </label>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
