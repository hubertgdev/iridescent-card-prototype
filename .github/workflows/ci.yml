name: CI/CD

on:
  push:
    branches:
      - dev
      - develop
      - main
      - master
  pull_request:
    branches:
      - dev
      - develop
      - main
      - master

jobs:
  check:
    name: Lint, types, tests & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci
      - run: npm run check
      - run: npm run verify
      - run: npm test
      - run: npm run build

  # This job runs only on push to `main` or `master`, uses `semantic-release`
  # to bump the package version, and deploy the app to Cloudflare Pages.
  release-deploy:
    name: Release & deploy
    needs: check
    if: >
      github.event_name == 'push'
      && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
      && !github.event.repository.is_template
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      # Semantic release will bump the package version, so the app must be re-built after this call
      - run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - run: npm run build

      # Handle Cloudflare Pages deployment.
      # You can remove the two following steps if you don't need Cloudflare Pages deployment for this project.
      - name: Check Cloudflare credentials
        run: |
          if [[ -z "$CLOUDFLARE_API_TOKEN" || -z "$CLOUDFLARE_ACCOUNT_ID" ]]; then
            echo "::warning::CLOUDFLARE_API_TOKEN or CLOUDFLARE_ACCOUNT_ID is not set in repository secrets. Set them to enable deployment to Cloudflare Pages, or remove this step from this workflow if you don't use it."
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME || github.event.repository.name }}